default_stages: [commit, push]
repos:
  - repo: https://github.com/psf/black
    rev: 23.1.0 # Use the latest version
    hooks:
      - id: black
        files: ^backend/ # Run only on the backend folder
        stages: [commit, push]
        
  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        files: ^backend/
        stages: [commit, push]

  # Fixed version of the pdoc check
  - repo: local
    hooks:
      - id: pdoc-check
        name: Check API documentation generation
        entry: pdoc
        language: python
        files: ^backend/
        stages: [push]
        additional_dependencies: ['pdoc']
        args: ['.']